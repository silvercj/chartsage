steps:
  - name: gcr.io/cloud-builders/docker
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/chartsage-backend:${_TAG}', '.']
  - name: gcr.io/cloud-builders/docker
    args: ['push', 'gcr.io/$PROJECT_ID/chartsage-backend:${_TAG}']
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - chartsage-backend
      - --image=gcr.io/$PROJECT_ID/chartsage-backend:${_TAG}
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --memory=1Gi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --concurrency=4
      - --timeout=120s
      - --service-account=chartsage-runner@$PROJECT_ID.iam.gserviceaccount.com
      - --set-secrets=ANTHROPIC_API_KEY=anthropic-key:latest,SUPABASE_SERVICE_ROLE_KEY=supabase-srk:latest,POSTHOG_API_KEY=posthog-key:latest,ADMIN_API_TOKEN=admin-api-token:latest,SENTRY_DSN=sentry-dsn:latest
      - --set-env-vars=SUPABASE_URL=$_SUPABASE_URL,FRONTEND_BASE_URL=$_FRONTEND_BASE_URL,CLAUDE_MODEL=haiku-4-5,ANON_REPORT_LIMIT=$_ANON_REPORT_LIMIT,UNLIMITED_ANON_IDS=$_UNLIMITED_ANON_IDS,ANON_IP_DAILY_CAP=$_ANON_IP_DAILY_CAP,ANON_GLOBAL_DAILY_CAP=$_ANON_GLOBAL_DAILY_CAP

# _TAG defaults to 'latest'; CI/manual runs can pass --substitutions=_TAG=<git-sha>.
# (Built-in $SHORT_SHA is only populated for trigger-based builds, not `gcloud builds submit`.)
substitutions:
  _TAG: 'latest'
  _SUPABASE_URL: 'https://YOUR_PROJECT.supabase.co'
  _FRONTEND_BASE_URL: 'https://chartsage.app'   # canonical custom domain; used by Playwright export render. Do NOT source .env (that's localhost).
  _ANON_REPORT_LIMIT: '1'           # free reports per anonymous visitor
  _UNLIMITED_ANON_IDS: ''           # comma-separated anon IDs that bypass the cap (owner/QA); empty in git
  _ANON_IP_DAILY_CAP: '5'
  _ANON_GLOBAL_DAILY_CAP: '200'

images:
  - 'gcr.io/$PROJECT_ID/chartsage-backend:${_TAG}'
